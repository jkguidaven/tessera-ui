name: Release & Deploy Docs

on:
  release:
    types: [published]

concurrency:
  group: deploy-pages
  cancel-in-progress: false

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Build core (Stencil)
      - run: pnpm build

      # Build framework wrapper packages
      - run: pnpm -r --filter='!@tessera-ui/docs' run build

      # Publish packages whose version isn't yet on npm
      - run: pnpm exec lerna publish from-package --yes --no-private
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the component library (generates dist/components.json)
      - run: pnpm build

      # Build Storybook
      - run: pnpm build-storybook

      # Generate docs and build the Astro site
      - name: Build docs
        run: pnpm -C docs build
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}

      # Combine: docs site at root, storybook at /storybook/
      - name: Combine outputs
        run: |
          mkdir -p docs/dist/storybook
          cp -r storybook-static/* docs/dist/storybook/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist/

      - id: deploy
        uses: actions/deploy-pages@v4
